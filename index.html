<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos Lead Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #080D14;
  --surface: #0F1620;
  --s2:      #162030;
  --border:  #1E2D40;
  --accent:  #00D4FF;
  --adim:    rgba(0,212,255,0.1);
  --red:     #FF3B3B;
  --rdim:    rgba(255,59,59,0.1);
  --green:   #00E07A;
  --gdim:    rgba(0,224,122,0.1);
  --orange:  #FF9500;
  --star:    #FFB800;
  --text:    #E8F0F8;
  --muted:   #5A7A99;
}
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; font-size:14px; }
a { color:inherit; text-decoration:none; }

/* ── Header ── */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 22px; display:flex; align-items:center; justify-content:space-between;
  gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:100;
}
.logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--accent); white-space:nowrap; }
.logo span { color:var(--text); }
.header-stats { display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
.hstat { display:flex; flex-direction:column; align-items:center; gap:1px; }
.hstat-n { font-family:'Syne',sans-serif; font-size:19px; font-weight:700; line-height:1; }
.hstat-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.c-accent { color:var(--accent); }
.c-red    { color:var(--red); }
.c-purple { color:#A855F7; }
.c-green  { color:var(--green); }

/* ── Search panel ── */
.search-panel { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 22px; }
.search-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.sinput {
  flex:1; min-width:130px;
  background:var(--bg); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  padding:9px 13px; outline:none; transition:border-color .2s;
}
.sinput:focus { border-color:var(--accent); }
.sinput::placeholder { color:var(--muted); }
.sinput.loc { max-width:180px; }
.radius-sel {
  background:var(--bg); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
  padding:9px 10px; outline:none; cursor:pointer; max-width:110px;
}
.radius-sel option { background:var(--surface); }
.search-go {
  background:var(--accent); color:#000; border:none; border-radius:9px;
  padding:9px 22px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:opacity .2s;
}
.search-go:hover { opacity:.85; }
.search-go:disabled { opacity:.4; cursor:not-allowed; }

/* Quick buttons */
.quick-row { display:flex; flex-wrap:wrap; gap:6px; }
.qbtn {
  background:var(--s2); border:1px solid var(--border); color:var(--text);
  border-radius:16px; padding:4px 12px; font-size:12px; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.qbtn:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }

/* Search history */
.history-row { padding:8px 22px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; border-bottom:1px solid var(--border); min-height:36px; }
.hist-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.hbtn {
  background:none; border:1px solid var(--border); color:var(--muted);
  border-radius:14px; padding:3px 10px; font-size:11px; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .15s;
}
.hbtn:hover { border-color:var(--accent); color:var(--accent); }

/* ── Toolbar ── */
.toolbar {
  padding:8px 22px; display:flex; gap:7px; flex-wrap:wrap; align-items:center;
  border-bottom:1px solid var(--border);
}
.fbtn {
  background:var(--s2); border:1px solid var(--border); color:var(--muted);
  border-radius:6px; padding:4px 12px; font-size:12px; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.fbtn.active { background:var(--adim); border-color:var(--accent); color:var(--accent); }
.fbtn:hover:not(.active) { border-color:#3a5070; color:var(--text); }
.tsep { flex:1; }
.tbtn {
  background:var(--s2); border:1px solid var(--border); color:var(--muted);
  border-radius:7px; padding:4px 12px; font-size:12px; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.tbtn:hover { border-color:var(--accent); color:var(--accent); }
.tbtn:disabled { opacity:.35; cursor:not-allowed; pointer-events:none; }

/* ── Loading / Empty ── */
.loading { display:none; flex-direction:column; align-items:center; gap:12px; padding:56px 22px; text-align:center; }
.loading.show { display:flex; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-txt { color:var(--muted); font-size:13px; }

.empty-state { display:none; flex-direction:column; align-items:center; gap:10px; padding:56px 22px; text-align:center; color:var(--muted); }
.empty-state.show { display:flex; }
.ei { font-size:36px; }
.et { font-family:'Syne',sans-serif; font-size:17px; color:var(--text); }

/* ── Results ── */
.results-wrap { padding:14px 22px 16px; }
.res-info { font-size:12px; color:var(--muted); margin-bottom:12px; }
.results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(285px,1fr)); gap:11px; }

/* ── Cards ── */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:13px;
  padding:13px; display:flex; flex-direction:column; gap:7px; transition:border-color .2s;
}
.card:hover { border-color:#2a3f58; }
.card.hot { border-color:rgba(255,59,59,.28); background:linear-gradient(135deg,var(--surface),rgba(255,59,59,.04)); }
.card.hot:hover { border-color:rgba(255,59,59,.55); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
.card-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; line-height:1.3; flex:1; }
.badge { font-size:9px; font-weight:700; border-radius:5px; padding:2px 6px; white-space:nowrap; flex-shrink:0; }
.b-hot  { background:var(--rdim); color:var(--red);    border:1px solid rgba(255,59,59,.22); }
.b-web  { background:var(--gdim); color:var(--green);  border:1px solid rgba(0,224,122,.18); }
.b-yelp { background:rgba(255,80,0,.12); color:#FF5000; border:1px solid rgba(255,80,0,.25); }

.score-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.grade { font-size:9px; font-weight:700; border-radius:4px; padding:2px 6px; white-space:nowrap; }
.gA { background:rgba(255,59,59,.15); color:#ff5555; border:1px solid rgba(255,59,59,.28); }
.gB { background:rgba(255,149,0,.1); color:var(--orange); border:1px solid rgba(255,149,0,.22); }
.gC { background:rgba(255,184,0,.08); color:var(--star); border:1px solid rgba(255,184,0,.18); }
.gD { background:var(--s2); color:var(--muted); border:1px solid var(--border); }

.open-badge { font-size:9px; border-radius:4px; padding:2px 6px; font-weight:600; }
.open-y { background:rgba(0,224,122,.1); color:var(--green); border:1px solid rgba(0,224,122,.2); }
.open-n { background:var(--rdim); color:var(--red); border:1px solid rgba(255,59,59,.2); }

.card-addr { font-size:11px; color:var(--muted); line-height:1.4; }
.card-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.stars { color:var(--star); font-size:12px; font-weight:600; display:flex; align-items:center; gap:3px; }
.rcount { font-size:10px; color:var(--muted); }
.cphone { font-size:11px; color:var(--muted); }
.no-phone { font-size:10px; color:#2a3f58; }
.card-site { font-size:11px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; display:inline-block; }
.card-site:hover { text-decoration:underline; }
.director-row { font-size:10px; color:var(--muted); }
.director-row strong { color:var(--text); }

/* Email row */
.email-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-height:18px; }
.efound { font-size:11px; color:var(--green); }
.enone  { font-size:10px; color:#2a3f58; }
.escrape-dot {
  display:inline-block; width:7px; height:7px; border-radius:50%;
  flex-shrink:0; background:var(--muted); opacity:.4; transition:all .3s;
}
.escrape-dot.scraping { background:var(--accent); opacity:1; animation:edot 1s ease-in-out infinite; }
.escrape-dot.found    { background:var(--green);  opacity:1; animation:none; }
.escrape-dot.none     { background:var(--muted);  opacity:.25; animation:none; }
@keyframes edot { 0%,100%{opacity:1} 50%{opacity:.2} }
.efind-btn {
  font-size:10px; background:none; border:1px solid var(--border); color:var(--muted);
  border-radius:4px; padding:2px 7px; cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif;
}
.efind-btn:hover { border-color:var(--accent); color:var(--accent); }
.efind-btn:disabled { opacity:.35; cursor:not-allowed; }

/* Status */
.status-row { display:flex; align-items:center; gap:6px; }
.slabel { font-size:10px; color:var(--muted); }
.ssel {
  background:var(--bg); border:1px solid var(--border); color:var(--muted);
  border-radius:4px; font-size:10px; font-family:'DM Sans',sans-serif; padding:2px 5px;
  outline:none; cursor:pointer; transition:border-color .15s;
}
.ssel:focus { border-color:var(--accent); }
.s-called { color:var(--accent); border-color:rgba(0,212,255,.3); }
.s-demo   { color:var(--star); border-color:rgba(255,184,0,.3); }
.s-won    { color:var(--green); border-color:rgba(0,224,122,.3); }
.s-lost   { color:#2a3f58; }

/* Actions */
.card-actions { display:flex; gap:5px; margin-top:3px; }
.abtn {
  flex:1; background:var(--s2); border:1px solid var(--border); color:var(--text);
  border-radius:7px; padding:6px 2px; font-size:11px; font-family:'DM Sans',sans-serif;
  font-weight:500; cursor:pointer; text-align:center; text-decoration:none;
  display:flex; align-items:center; justify-content:center; gap:3px; transition:all .15s;
}
.abtn:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.abtn:disabled { opacity:.25; cursor:not-allowed; pointer-events:none; }
.abtn.wa:hover  { border-color:#25D366 !important; color:#25D366 !important; background:rgba(37,211,102,.08) !important; }
.abtn.add:hover { border-color:var(--green) !important; color:var(--green) !important; background:var(--gdim) !important; }

/* ── Pagination ── */
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; padding:20px 22px; flex-wrap:wrap; }
.pg-btn {
  background:var(--s2); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:7px 16px; font-family:'Syne',sans-serif; font-size:13px;
  font-weight:700; cursor:pointer; transition:all .2s;
}
.pg-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--adim); }
.pg-btn:disabled { opacity:.3; cursor:not-allowed; }
.pg-info { font-size:13px; color:var(--muted); }

/* ── Modals ── */
.moverlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.78);
  z-index:200; align-items:center; justify-content:center; padding:16px;
}
.moverlay.show { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:24px; width:100%; max-width:440px; display:flex; flex-direction:column;
  gap:12px; max-height:90vh; overflow-y:auto;
}
.mtitle { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
.msub   { font-size:12px; color:var(--muted); margin-top:-4px; }
.frow   { display:flex; flex-direction:column; gap:4px; }
.flbl   { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.finput, .fsel {
  background:var(--bg); border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
  padding:8px 11px; outline:none; width:100%; transition:border-color .2s;
}
.finput:focus, .fsel:focus { border-color:var(--accent); }
.fsel option { background:var(--surface); }
.chip-row { display:flex; gap:7px; flex-wrap:wrap; }
.chip {
  width:26px; height:26px; border-radius:50%; border:3px solid transparent;
  cursor:pointer; transition:border-color .15s;
}
.chip.sel { border-color:#fff; }
.mactions { display:flex; gap:8px; margin-top:2px; }
.mcancel {
  flex:1; background:transparent; border:1px solid var(--border); color:var(--muted);
  border-radius:9px; padding:9px; font-family:'DM Sans',sans-serif; font-size:13px;
  font-weight:600; cursor:pointer; transition:all .15s;
}
.mcancel:hover { border-color:#3a5070; color:var(--text); }
.mconfirm {
  flex:2; background:var(--accent); border:none; color:#000;
  border-radius:9px; padding:9px; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer; transition:opacity .2s;
}
.mconfirm:hover { opacity:.85; }
.mconfirm:disabled { opacity:.4; cursor:not-allowed; }
.status-box { font-size:11px; padding:7px 10px; border-radius:6px; text-align:center; }
.sok  { background:var(--gdim); color:var(--green); border:1px solid rgba(0,224,122,.2); }
.swarn{ background:rgba(255,184,0,.08); color:var(--star); border:1px solid rgba(255,184,0,.2); }

/* ── Toast ── */
.toast {
  position:fixed; bottom:20px; right:20px; padding:9px 15px; border-radius:9px;
  font-size:12px; font-weight:600; z-index:300; opacity:0; transform:translateY(8px);
  transition:all .3s; pointer-events:none; max-width:280px;
}
.toast.show { opacity:1; transform:translateY(0); }

@media (max-width:600px) {
  .header,.search-panel,.toolbar,.results-wrap { padding-left:12px; padding-right:12px; }
  .history-row { padding:7px 12px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Kronos <span>Lead Finder</span></div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-n c-accent" id="hs-total">—</div><div class="hstat-l">This Search</div></div>
    <div class="hstat"><div class="hstat-n c-red" id="hs-nosite">—</div><div class="hstat-l">No Website</div></div>
    <div class="hstat"><div class="hstat-n c-purple" id="hs-emails">0</div><div class="hstat-l">Emails Found</div></div>
    <div class="hstat"><div class="hstat-n c-green" id="hs-db">—</div><div class="hstat-l">In Database</div></div>
  </div>
</header>

<!-- Search -->
<div class="search-panel">
  <div class="search-row">
    <input class="sinput" id="inp-q" type="text" placeholder="Industry (e.g. Plumber, Barber, Cafe…)">
    <input class="sinput loc" id="inp-l" type="text" placeholder="City or Country" value="Hamilton">
    <select class="radius-sel" id="inp-r">
      <option value="5000">5 km</option>
      <option value="10000">10 km</option>
      <option value="20000" selected>20 km</option>
      <option value="50000">50 km</option>
    </select>
    <button class="search-go" id="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="quick-row">
    <button class="qbtn" onclick="qs('Plumber','Hamilton')">Plumber Hamilton</button>
    <button class="qbtn" onclick="qs('Electrician','Hamilton')">Electrician Hamilton</button>
    <button class="qbtn" onclick="qs('Painter','Hamilton')">Painter Hamilton</button>
    <button class="qbtn" onclick="qs('Barber','Hamilton')">Barber Hamilton</button>
    <button class="qbtn" onclick="qs('Plumber','Auckland')">Plumber Auckland</button>
    <button class="qbtn" onclick="qs('Electrician','Auckland')">Electrician Auckland</button>
    <button class="qbtn" onclick="qs('Cafe','Auckland')">Cafe Auckland</button>
    <button class="qbtn" onclick="qs('Builder','Christchurch')">Builder Christchurch</button>
  </div>
</div>

<!-- Search history -->
<div class="history-row" id="hist-row">
  <span class="hist-label">Recent:</span>
  <span id="hist-items" style="display:flex;flex-wrap:wrap;gap:5px;"></span>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Filter:</span>
  <button class="fbtn active" data-f="all"    onclick="setFilter('all')">All</button>
  <button class="fbtn" data-f="nosite"  onclick="setFilter('nosite')">🔥 No Website</button>
  <button class="fbtn" data-f="stars"   onclick="setFilter('stars')">⭐ 4+ Stars</button>
  <button class="fbtn" data-f="open"    onclick="setFilter('open')">🟢 Open Now</button>
  <button class="fbtn" data-f="gradeA"  onclick="setFilter('gradeA')">🎯 Grade A</button>
  <div class="tsep"></div>
  <button class="tbtn" id="btn-more"      onclick="moreResults()" disabled>🔄 More Results</button>
  <button class="tbtn" id="btn-allemails" onclick="bulkEmail()" disabled>📧 Find All Emails</button>
  <button class="tbtn" id="btn-export"    onclick="exportCSV()" disabled>⬇ Export CSV</button>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Searching…</div>
</div>

<!-- Empty -->
<div class="empty-state" id="empty">
  <div class="ei">🔍</div>
  <div class="et">No results yet</div>
  <div>Search an industry and location above</div>
</div>

<!-- Results -->
<div id="results-wrap" style="display:none;">
  <div class="results-wrap">
    <div class="res-info" id="res-info"></div>
    <div class="results-grid" id="grid"></div>
  </div>
  <div class="pagination" id="pagination" style="display:none;">
    <button class="pg-btn" id="pg-prev" onclick="prevPage()" disabled>← Prev</button>
    <span class="pg-info" id="pg-info">Page 1</span>
    <button class="pg-btn" id="pg-next" onclick="nextPage()" disabled>Next →</button>
  </div>
</div>

<!-- Add Modal -->
<div class="moverlay" id="m-add">
  <div class="modal">
    <div><div class="mtitle">➕ Add Lead</div><div class="msub" id="m-sub">Confirm details</div></div>
    <div class="frow"><label class="flbl">Business Name</label><input class="finput" id="m-name"></div>
    <div class="frow">
      <label class="flbl">Industry</label>
      <select class="fsel" id="m-ind">
        <option value="plumber">Plumber</option>
        <option value="electrician">Electrician</option>
        <option value="painter">Painter</option>
        <option value="builder">Builder</option>
        <option value="trades">Trades</option>
        <option value="auto">Auto / Mechanic</option>
        <option value="barber">Barber</option>
        <option value="cafe">Cafe</option>
        <option value="salon">Salon</option>
        <option value="gym">Gym</option>
        <option value="restaurant">Restaurant</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="frow"><label class="flbl">Phone</label><input class="finput" id="m-phone" type="tel"></div>
    <div class="frow"><label class="flbl">Email</label><input class="finput" id="m-email" type="email" placeholder="Leave blank if unknown"></div>
    <div class="frow"><label class="flbl">Address</label><input class="finput" id="m-addr"></div>
    <div class="frow">
      <label class="flbl">Colour Tag</label>
      <div class="chip-row" id="chip-row">
        <div class="chip sel" data-c="#FF3B3B" style="background:#FF3B3B" onclick="pickColour(this)"></div>
        <div class="chip" data-c="#FF9500" style="background:#FF9500" onclick="pickColour(this)"></div>
        <div class="chip" data-c="#FFB800" style="background:#FFB800" onclick="pickColour(this)"></div>
        <div class="chip" data-c="#00E07A" style="background:#00E07A" onclick="pickColour(this)"></div>
        <div class="chip" data-c="#00D4FF" style="background:#00D4FF" onclick="pickColour(this)"></div>
        <div class="chip" data-c="#A855F7" style="background:#A855F7" onclick="pickColour(this)"></div>
      </div>
    </div>
    <div id="m-badge"></div>
    <div class="mactions">
      <button class="mcancel" onclick="closeModal('m-add')">Cancel</button>
      <button class="mconfirm" id="m-confirm" onclick="confirmAdd()">Save to Sheet & DB</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Constants ──
const COLOURS  = ['#FF3B3B','#FF9500','#FFB800','#00E07A','#00D4FF','#A855F7'];
const INDUSTRY_OPTS = ['plumber','electrician','painter','builder','auto','barber','cafe','salon','gym','restaurant','trades'];

// ── State ──
let allResults    = [];
let filtered      = [];
let currentFilter = 'all';
let currentPage     = 1;
let totalPages      = 1;
let currentQuery    = '';
let currentLoc      = '';
let currentIndustry = '';
let currentLocation = '';
let addedCount    = 0;
let pendingIdx    = null;
let selColour     = '#FF3B3B';
const emailCache  = {};
const statusStore = JSON.parse(localStorage.getItem('k_status') || '{}');
let searchHistory = JSON.parse(localStorage.getItem('k_hist') || '[]');

// ── Init ──
loadStats();
renderHistory();
document.getElementById('empty').classList.add('show');
['inp-q','inp-l'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); })
);

// ── Stats ──
async function loadStats() {
  try {
    const d = await apiFetch('/api/stats');
    document.getElementById('hs-db').textContent = d.total ?? '—';
  } catch(e) {}
}

// ── Search ──
function qs(industry, location) {
  document.getElementById('inp-q').value = industry;
  document.getElementById('inp-l').value = location;
  doSearch();
}

async function doSearch(page) {
  page = page || 1;
  const q = page === 1 ? document.getElementById('inp-q').value.trim() : currentQuery;
  const l = page === 1 ? (document.getElementById('inp-l').value.trim() || 'Hamilton') : currentLoc;
  if (!q) { showToast('Enter an industry to search','#FF3B3B'); return; }

  if (page === 1) {
    currentQuery    = q;
    currentLoc      = l;
    currentLocation = l;
    currentIndustry = q;
    currentPage     = 1;
    allResults      = [];
    saveHistory(q, l);
  } else {
    currentPage = page;
  }

  setLoading(true, `Searching for ${q} in ${l}… (page ${currentPage})`);
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('empty').classList.remove('show');

  try {
    const data = await apiFetch(`/api/places?query=${enc(currentQuery)}&location=${enc(currentLoc)}&page=${currentPage}`);

    allResults = data.results || [];
    totalPages = data.totalPages || 1;

    updateHeaderStats();
    applyFilter();
    document.getElementById('results-wrap').style.display = 'block';

    // Suburb label
    const subs = data.suburbsSearched || [];
    document.getElementById('res-info').textContent =
      `Showing ${filtered.length} of ${allResults.length} result${allResults.length !== 1 ? 's' : ''}` +
      (subs.length ? ` — Searching: ${subs.join(', ')}` : '');

    const hasPrev = currentPage > 1;
    const hasNext = currentPage < totalPages;
    const pgDiv   = document.getElementById('pagination');
    pgDiv.style.display = (hasPrev || hasNext) ? 'flex' : 'none';
    document.getElementById('pg-prev').disabled = !hasPrev;
    document.getElementById('pg-next').disabled = !hasNext;
    document.getElementById('pg-info').textContent = `Page ${currentPage} of ${totalPages}`;

    document.getElementById('btn-allemails').disabled = allResults.length === 0;
    document.getElementById('btn-export').disabled    = allResults.length === 0;
    document.getElementById('btn-more').disabled      = !hasNext;
    loadStats();
    // Fire background auto-scrape (saves each lead individually as it completes)
    autoScrapeAllEmails(allResults);
  } catch(e) {
    showToast(e.message || 'Search failed','#FF3B3B');
    showEmpty('Search failed — check API key or try a different location');
  } finally {
    setLoading(false);
  }
}

async function nextPage() {
  if (currentPage >= totalPages) return;
  await doSearch(currentPage + 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function prevPage() {
  if (currentPage <= 1) return;
  await doSearch(currentPage - 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function moreResults() {
  if (currentPage >= totalPages) { showToast('No more results','#FF9500'); return; }
  await doSearch(currentPage + 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Filters ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-f="${f}"]`).classList.add('active');
  applyFilter();
}

function applyFilter() {
  switch(currentFilter) {
    case 'nosite':  filtered = allResults.filter(b => !b.hasWebsite); break;
    case 'stars':   filtered = allResults.filter(b => b.rating >= 4); break;
    case 'open':    filtered = allResults.filter(b => b.isOpen === true); break;
    case 'gradeA':  filtered = allResults.filter(b => grade(b) === 'A'); break;
    default:        filtered = [...allResults];
  }
  renderGrid();
}

// ── Stats ──
function updateHeaderStats() {
  document.getElementById('hs-total').textContent  = allResults.length;
  document.getElementById('hs-nosite').textContent = allResults.filter(b => !b.hasWebsite).length;
  const ec = Object.values(emailCache).filter(v => v && v.length > 0).length;
  document.getElementById('hs-emails').textContent = ec;
}

// ── Scoring ──
function grade(b) {
  let s = 0;
  if (!b.hasWebsite)    s += 40;
  if (b.phone)          s += 20;
  if (b.rating >= 4)    s += 15;
  if (b.rating >= 4.5)  s += 10;
  if (b.reviewCount>=10) s += 10;
  if (b.reviewCount>=50) s += 5;
  if (s >= 70) return 'A';
  if (s >= 50) return 'B';
  if (s >= 30) return 'C';
  return 'D';
}

function gradeLabel(g) {
  return {A:'🎯 Grade A',B:'⬡ Grade B',C:'⬡ Grade C',D:'⬡ Grade D'}[g] || g;
}

// ── Render ──
function renderGrid() {
  const grid = document.getElementById('grid');
  document.getElementById('res-info').textContent =
    `Showing ${filtered.length} of ${allResults.length} result${allResults.length!==1?'s':''}`;

  if (!allResults.length) { showEmpty('No businesses found — try a different search'); return; }
  document.getElementById('empty').classList.remove('show');

  grid.innerHTML = filtered.map(b => {
    const idx  = allResults.indexOf(b);
    const g    = grade(b);
    const st   = statusStore[b.place_id] || 'new';
    const ec   = emailCache[b.place_id];
    const wa   = b.phone ? b.phone.replace(/\D/g,'') : '';
    const waNr = wa.startsWith('0') ? '64'+wa.slice(1) : wa;
    const maps = `https://www.google.com/maps/search/?api=1&query=${enc(b.name+' '+b.address)}`;

    let emailHtml;
    if (ec === undefined) {
      emailHtml = `<span class="escrape-dot scraping" id="esd-${idx}"></span><span class="lead-email" id="lem-${idx}" style="font-size:10px;color:var(--muted)">Searching…</span>`;
    } else if (ec.length > 0) {
      emailHtml = `<span class="escrape-dot found"></span><span class="efound">✉ ${esc(ec[0])}</span>`;
    } else {
      emailHtml = `<span class="escrape-dot none"></span><span class="enone">No email found</span>`;
    }

    return `
    <div class="card ${!b.hasWebsite?'hot':''}" id="card-${idx}">
      <div class="card-top">
        <div class="card-name">${esc(b.name)}</div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          ${b.source === 'yelp' ? '<span class="badge b-yelp">Y Yelp</span>' : ''}
          ${!b.hasWebsite ? '<span class="badge b-hot">🔥 No Website</span>' : '<span class="badge b-web">✓ Has Website</span>'}
        </div>
      </div>
      <div class="score-row">
        <span class="grade g${g}">${gradeLabel(g)}</span>
        ${b.isOpen === true  ? '<span class="open-badge open-y">Open Now</span>' : ''}
        ${b.isOpen === false ? '<span class="open-badge open-n">Closed</span>'   : ''}
      </div>
      ${b.address ? `<div class="card-addr">${esc(b.address)}</div>` : ''}
      <div class="card-meta">
        ${b.rating ? `<span class="stars">★ ${b.rating}<span class="rcount">${b.reviewCount?'('+b.reviewCount+')':''}</span></span>` : ''}
        ${b.phone ? `<span class="cphone">${esc(b.phone)}</span>` : '<span class="no-phone">No phone</span>'}
      </div>
      ${b.website ? `<a class="card-site" href="${esc(b.website)}" target="_blank" rel="noopener">${esc(b.website.replace(/^https?:\/\//,'').replace(/\/$/,''))}</a>` : ''}
      ${b.director ? `<div class="director-row">👤 Director: <strong>${esc(b.director)}</strong></div>` : ''}
      <div class="email-row" id="er-${idx}">${emailHtml}</div>
      <div class="status-row">
        <span class="slabel">Status:</span>
        <select class="ssel s-${st}" id="ss-${idx}" onchange="setStatus(${idx},this)">
          <option value="new"    ${st==='new'?'selected':''}>New</option>
          <option value="called" ${st==='called'?'selected':''}>📞 Called</option>
          <option value="demo"   ${st==='demo'?'selected':''}>👁 Demo Sent</option>
          <option value="won"    ${st==='won'?'selected':''}>✅ Won</option>
          <option value="lost"   ${st==='lost'?'selected':''}>❌ Lost</option>
        </select>
      </div>
      <div class="card-actions">
        ${b.phone ? `<a class="abtn" href="tel:${esc(b.phone)}">📞 Call</a>` : '<button class="abtn" disabled>📞</button>'}
        ${wa ? `<a class="abtn wa" href="https://wa.me/${waNr}" target="_blank">💬 WA</a>` : '<button class="abtn" disabled>💬</button>'}
        <button class="abtn" onclick="openDemo(${idx})">👁 Demo</button>
        <a class="abtn" href="${maps}" target="_blank" title="Google Maps">🗺</a>
        <button class="abtn add" onclick="openAddModal(${idx})">+ Add</button>
      </div>
    </div>`;
  }).join('');
}

// ── Email ──
async function findEmail(idx) {
  const b = allResults[idx];
  const btn = document.getElementById(`efb-${idx}`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }
  try {
    let url = `/api/email?name=${enc(b.name)}&location=${enc(currentLoc)}`;
    if (b.website) url += `&website=${enc(b.website)}`;
    const d = await apiFetch(url);
    emailCache[b.place_id] = d.emails || [];
  } catch(e) { emailCache[b.place_id] = []; }
  updateEmailRow(idx);
  updateHeaderStats();
}

function updateEmailRow(idx) {
  const b = allResults[idx];
  const row = document.getElementById(`er-${idx}`);
  if (!row) return;
  const ec = emailCache[b.place_id];
  row.innerHTML = ec && ec.length > 0
    ? `<span class="escrape-dot found"></span><span class="efound">✉ ${esc(ec[0])}</span>`
    : `<span class="escrape-dot none"></span><span class="enone">No email found</span>`;
}

const CHATBOT_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwXmjBo9tAAAWEReoL5BGYtyxx8zXJ9vYWspNGI10pC5OpYENZUYOcfiHSAWHECYSOp/exec';

async function autoScrapeAllEmails(results) {
  const batchSize = 3;

  for (let i = 0; i < results.length; i += batchSize) {
    const batch = results.slice(i, i + batchSize);

    // Scrape 3 simultaneously
    await Promise.all(batch.map(async (place) => {
      const idx = results.indexOf(place);
      const dot = document.getElementById(`esd-${idx}`);
      if (dot) dot.className = 'escrape-dot scraping';

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        const params = new URLSearchParams({ name: place.name || '' });
        if (place.website) params.append('website', place.website);
        if (currentLocation) params.append('location', currentLocation);

        const res = await fetch(`/api/email?${params.toString()}`, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await res.json();

        const emails = data.emails || [];
        emailCache[place.place_id] = emails;
        place.foundEmail = emails[0] || '';
        if (dot) dot.className = emails.length > 0 ? 'escrape-dot found' : 'escrape-dot none';
      } catch(e) {
        emailCache[place.place_id] = [];
        place.foundEmail = '';
        if (dot) dot.className = 'escrape-dot none';
      }
      updateEmailRow(results.indexOf(place));
      updateHeaderStats();
    }));

    // Save this batch to sheet immediately
    await saveBatchToSheet(batch);
    showToast(`✓ Saved ${Math.min(i + batchSize, results.length)} of ${results.length} to sheet`);
    await new Promise(r => setTimeout(r, 500));
  }

  showToast(`✓ All ${results.length} leads saved to sheet!`, '#00E07A');
}

async function saveBatchToSheet(batch) {
  for (const place of batch) {
    try {
      const payload = {
        name:       place.name || '',
        industry:   currentIndustry || '',
        phone:      place.phone || '',
        email:      place.foundEmail || '',
        website:    place.website || '',
        hasWebsite: place.hasWebsite || false,
        rating:     place.rating || '',
        address:    place.address || '',
        status:     place.hasWebsite ? 'Has Website - Auto Added' : 'No Website - Review Needed',
        date:       new Date().toLocaleDateString()
      };
      console.log('Saving to sheet:', payload);
      const response = await fetch(CHATBOT_WEBHOOK, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      console.log('Sheet POST sent (no-cors):', payload.name);
    } catch(e) {
      console.error('Failed to save to sheet:', place.name, e.message);
    }
  }
}

async function bulkEmail() {
  const btn = document.getElementById('btn-allemails');
  btn.disabled = true;
  const todo = allResults.filter(b => b.website && emailCache[b.place_id] === undefined);
  showToast(`Finding emails for ${todo.length} businesses…`,'#A855F7');
  for (let i = 0; i < todo.length; i++) {
    await findEmail(allResults.indexOf(todo[i]));
    btn.textContent = `📧 ${i+1}/${todo.length}`;
  }
  btn.textContent = '📧 Find All Emails';
  btn.disabled = false;
  showToast('Email search complete!','#00E07A');
}

// ── Status ──
function setStatus(idx, sel) {
  const b = allResults[idx];
  const v = sel.value;
  statusStore[b.place_id] = v;
  localStorage.setItem('k_status', JSON.stringify(statusStore));
  sel.className = `ssel s-${v}`;
}

// ── Demo ──
function openDemo(idx) {
  const b = allResults[idx];
  window.open(`https://demo.kronosai.co.nz/?b=${enc(b.name)}&t=${enc(currentQuery)}&p=${enc(b.phone||'')}`, '_blank');
}

// ── Add Modal ──
function openAddModal(idx) {
  pendingIdx = idx;
  const b = allResults[idx];
  document.getElementById('m-name').value  = b.name;
  document.getElementById('m-phone').value = b.phone || '';
  document.getElementById('m-addr').value  = b.address || '';
  const ec = emailCache[b.place_id];
  document.getElementById('m-email').value = ec && ec.length ? ec[0] : '';
  const qi = currentQuery.toLowerCase();
  document.getElementById('m-ind').value = INDUSTRY_OPTS.find(o => qi.includes(o)) || 'trades';
  selColour = '#FF3B3B';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
  document.querySelector('.chip[data-c="#FF3B3B"]').classList.add('sel');
  document.getElementById('m-badge').innerHTML = '<div class="status-box sok">✓ Connected — saves to Supabase & Google Sheet</div>';
  document.getElementById('m-add').classList.add('show');
}

function pickColour(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  selColour = el.dataset.c;
}

async function confirmAdd() {
  const btn = document.getElementById('m-confirm');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const b = pendingIdx !== null ? allResults[pendingIdx] : {};
  const payload = {
    place_id: b.place_id || '',
    name:     document.getElementById('m-name').value.trim(),
    industry: document.getElementById('m-ind').value,
    phone:    document.getElementById('m-phone').value.trim(),
    email:    document.getElementById('m-email').value.trim(),
    address:  document.getElementById('m-addr').value.trim(),
    website:  b.website || '',
    rating:   b.rating || 0,
    colour:   selColour
  };

  closeModal('m-add');

  try {
    await fetch('/api/add-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    addedCount++;
    showToast(`${payload.name} saved!`, '#00E07A');
    loadStats();
  } catch(e) {
    showToast('Save failed — check connection','#FF3B3B');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save to Sheet & DB';
  }
}

// ── Export CSV ──
function exportCSV() {
  if (!allResults.length) return;
  const hdrs = ['Name','Industry','Phone','Email','Address','Website','Rating','Reviews','Has Website','Grade','Status','Director'];
  const rows = allResults.map(b => {
    const ec = emailCache[b.place_id];
    return [
      b.name, currentQuery, b.phone, ec&&ec[0]?ec[0]:'', b.address, b.website,
      b.rating, b.reviewCount, b.hasWebsite?'Yes':'No',
      grade(b), statusStore[b.place_id]||'new', b.director||''
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`);
  });
  const csv = [hdrs.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `leads-${currentQuery}-${currentLoc}-p${currentPage}.csv`;
  a.click();
  showToast('CSV downloaded!','#00E07A');
}

// ── History ──
function saveHistory(q, l) {
  const key = `${q} — ${l}`;
  searchHistory = [key, ...searchHistory.filter(x => x !== key)].slice(0, 10);
  localStorage.setItem('k_hist', JSON.stringify(searchHistory));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('hist-items');
  if (!searchHistory.length) { el.innerHTML = '<span style="font-size:11px;color:var(--muted);">No recent searches</span>'; return; }
  el.innerHTML = searchHistory.map(h => {
    const parts = h.split(' — ');
    return `<button class="hbtn" onclick="qs('${esc(parts[0]||'')}','${esc(parts[1]||'')}')">${esc(h)}</button>`;
  }).join('');
}

// ── Helpers ──
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.moverlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('show'); });
});

function setLoading(on, msg) {
  document.getElementById('loading').classList.toggle('show', on);
  if(msg) document.getElementById('loading-txt').textContent = msg;
  document.getElementById('search-btn').disabled = on;
}

function showEmpty(msg) {
  const el = document.getElementById('empty');
  el.classList.add('show');
  el.querySelector('div:last-child').textContent = msg;
  document.getElementById('results-wrap').style.display = 'none';
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#00E07A';
  t.style.color = (color==='#FF3B3B'||color==='#A855F7') ? '#fff' : '#000';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3200);
}

async function apiFetch(url) {
  const r = await fetch(url);
  const d = await r.json();
  if (!r.ok && d.error) throw new Error(d.error);
  return d;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function enc(s) { return encodeURIComponent(s||''); }
