<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos Lead Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080D14;
    --surface: #0F1923;
    --surface2: #162030;
    --border: #1E2D40;
    --accent: #00D4FF;
    --accent-dim: rgba(0,212,255,0.12);
    --red: #FF3B3B;
    --red-dim: rgba(255,59,59,0.12);
    --text: #E8F0F8;
    --muted: #6B8099;
    --star: #FFB800;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--text); }

  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-num.red { color: var(--red); }
  .stat-num.green { color: #00E07A; }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Search area ── */
  .search-area {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    max-width: 820px;
    margin-bottom: 14px;
  }

  .search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .search-btn:hover { opacity: 0.85; }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Filters ── */
  .filters-bar {
    padding: 14px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn:hover:not(.active) {
    border-color: #3a5070;
    color: var(--text);
  }

  /* ── Results ── */
  .results-area {
    padding: 0 24px 40px;
  }

  .results-info {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    padding-top: 16px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #2a3f58; }
  .card.hot {
    border-color: rgba(255,59,59,0.35);
    background: linear-gradient(135deg, var(--surface), rgba(255,59,59,0.04));
  }
  .card.hot:hover { border-color: rgba(255,59,59,0.6); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-hot {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(255,59,59,0.3);
  }
  .badge-web {
    background: rgba(0,224,122,0.1);
    color: #00E07A;
    border: 1px solid rgba(0,224,122,0.25);
  }

  .card-address {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--star);
  }

  .phone-text {
    font-size: 13px;
    color: var(--muted);
  }

  .card-website {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    display: inline-block;
  }
  .card-website:hover { text-decoration: underline; }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .action-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .action-btn.add-btn:hover {
    border-color: #00E07A;
    color: #00E07A;
    background: rgba(0,224,122,0.08);
  }

  /* ── Loading ── */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px 24px;
    text-align: center;
  }
  .loading.show { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
  }

  /* ── Empty / Error ── */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state.show { display: flex; }
  .empty-icon { font-size: 40px; }
  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--text);
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: -8px;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input, .form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface); }

  .colour-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .colour-chip {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .colour-chip.selected { border-color: #fff; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .modal-cancel {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-cancel:hover { border-color: #3a5070; color: var(--text); }

  .modal-confirm {
    flex: 2;
    background: var(--accent);
    border: none;
    color: #000;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-confirm:hover { opacity: 0.85; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #00E07A;
    color: #000;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .search-area, .filters-bar, .results-area { padding-left: 16px; padding-right: 16px; }
    .search-row { flex-wrap: wrap; }
    .search-btn { width: 100%; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Kronos <span>Lead Finder</span></div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total Found</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="stat-nosite">0</div>
      <div class="stat-label">No Website</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="stat-added">0</div>
      <div class="stat-label">Added</div>
    </div>
  </div>
</header>

<!-- Search -->
<div class="search-area">
  <div class="search-row">
    <input class="search-input" id="inp-industry" type="text" placeholder="Industry (e.g. Plumber, Electrician, Barber…)" />
    <input class="search-input" id="inp-location" type="text" placeholder="Location" value="Hamilton" style="max-width:200px;" />
    <button class="search-btn" id="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickSearch('Plumber','Hamilton')">Plumber Hamilton</button>
    <button class="quick-btn" onclick="quickSearch('Electrician','Hamilton')">Electrician Hamilton</button>
    <button class="quick-btn" onclick="quickSearch('Painter','Hamilton')">Painter Hamilton</button>
    <button class="quick-btn" onclick="quickSearch('Barber','Hamilton')">Barber Hamilton</button>
    <button class="quick-btn" onclick="quickSearch('Plumber','Auckland')">Plumber Auckland</button>
    <button class="quick-btn" onclick="quickSearch('Electrician','Auckland')">Electrician Auckland</button>
    <button class="quick-btn" onclick="quickSearch('Cafe','Auckland')">Cafe Auckland</button>
    <button class="quick-btn" onclick="quickSearch('Builder','Christchurch')">Builder Christchurch</button>
  </div>
</div>

<!-- Filters -->
<div class="filters-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-filter="nosite" onclick="setFilter('nosite')">🔥 No Website Only</button>
  <button class="filter-btn" data-filter="stars" onclick="setFilter('stars')">⭐ 4+ Stars</button>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Searching Google Places…</div>
</div>

<!-- Empty state -->
<div class="empty-state" id="empty">
  <div class="empty-icon">🔍</div>
  <div class="empty-title">No results yet</div>
  <div>Search an industry and location to find leads</div>
</div>

<!-- Results -->
<div class="results-area">
  <div class="results-info" id="results-info" style="display:none;"></div>
  <div class="results-grid" id="results-grid"></div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div>
      <div class="modal-title">Add to Sheet</div>
      <div class="modal-subtitle">Confirm details before copying</div>
    </div>
    <div class="form-row">
      <label class="form-label">Business Name</label>
      <input class="form-input" id="m-name" type="text" />
    </div>
    <div class="form-row">
      <label class="form-label">Industry Type</label>
      <select class="form-select" id="m-industry">
        <option value="plumber">Plumber</option>
        <option value="electrician">Electrician</option>
        <option value="trades">Trades</option>
        <option value="auto">Auto</option>
        <option value="barber">Barber</option>
        <option value="cafe">Cafe</option>
        <option value="salon">Salon</option>
        <option value="gym">Gym</option>
        <option value="restaurant">Restaurant</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Phone</label>
      <input class="form-input" id="m-phone" type="tel" />
    </div>
    <div class="form-row">
      <label class="form-label">Email (optional)</label>
      <input class="form-input" id="m-email" type="email" placeholder="Leave blank if unknown" />
    </div>
    <div class="form-row">
      <label class="form-label">Colour Tag</label>
      <div class="colour-row" id="colour-row">
        <div class="colour-chip selected" data-colour="#FF3B3B" style="background:#FF3B3B;" onclick="selectColour(this)"></div>
        <div class="colour-chip" data-colour="#FF9500" style="background:#FF9500;" onclick="selectColour(this)"></div>
        <div class="colour-chip" data-colour="#FFB800" style="background:#FFB800;" onclick="selectColour(this)"></div>
        <div class="colour-chip" data-colour="#00E07A" style="background:#00E07A;" onclick="selectColour(this)"></div>
        <div class="colour-chip" data-colour="#00D4FF" style="background:#00D4FF;" onclick="selectColour(this)"></div>
        <div class="colour-chip" data-colour="#A855F7" style="background:#A855F7;" onclick="selectColour(this)"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmAdd()">Copy & Open Sheet</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let allResults = [];
  let currentFilter = 'all';
  let addedCount = 0;
  let currentIndustry = '';
  let selectedColour = '#FF3B3B';

  function quickSearch(industry, location) {
    document.getElementById('inp-industry').value = industry;
    document.getElementById('inp-location').value = location;
    doSearch();
  }

  async function doSearch() {
    const industry = document.getElementById('inp-industry').value.trim();
    const location = document.getElementById('inp-location').value.trim() || 'Hamilton';
    if (!industry) { showToast('Enter an industry to search', '#FF3B3B'); return; }

    currentIndustry = industry;

    document.getElementById('loading').classList.add('show');
    document.getElementById('empty').classList.remove('show');
    document.getElementById('results-grid').innerHTML = '';
    document.getElementById('results-info').style.display = 'none';
    document.getElementById('search-btn').disabled = true;

    try {
      const res = await fetch(`/api/places?query=${encodeURIComponent(industry)}&location=${encodeURIComponent(location)}`);
      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || 'Search failed', '#FF3B3B');
        showEmpty('Search failed — check API key or location');
        return;
      }

      allResults = data.results || [];
      updateStats();
      renderResults();

    } catch(e) {
      showToast('Network error', '#FF3B3B');
      showEmpty('Network error — check your connection');
    } finally {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('search-btn').disabled = false;
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allResults.length;
    document.getElementById('stat-nosite').textContent = allResults.filter(r => !r.hasWebsite).length;
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-filter="${f}"]`).classList.add('active');
    renderResults();
  }

  function getFiltered() {
    if (currentFilter === 'nosite') return allResults.filter(r => !r.hasWebsite);
    if (currentFilter === 'stars') return allResults.filter(r => r.rating >= 4);
    return allResults;
  }

  function renderResults() {
    const filtered = getFiltered();
    const grid = document.getElementById('results-grid');
    const info = document.getElementById('results-info');

    if (allResults.length === 0) {
      showEmpty('No businesses found — try a different search');
      return;
    }

    document.getElementById('empty').classList.remove('show');

    info.style.display = 'block';
    info.textContent = `Showing ${filtered.length} of ${allResults.length} result${allResults.length !== 1 ? 's' : ''}`;

    grid.innerHTML = filtered.map((b, i) => `
      <div class="card ${!b.hasWebsite ? 'hot' : ''}">
        <div class="card-header">
          <div class="card-name">${esc(b.name)}</div>
          ${!b.hasWebsite
            ? '<span class="badge badge-hot">🔥 No Website</span>'
            : '<span class="badge badge-web">✓ Has Website</span>'}
        </div>
        ${b.address ? `<div class="card-address">${esc(b.address)}</div>` : ''}
        <div class="card-meta">
          ${b.rating ? `<div class="rating">★ ${b.rating}</div>` : ''}
          ${b.phone ? `<div class="phone-text">${esc(b.phone)}</div>` : '<div class="phone-text" style="color:#FF3B3B;font-size:12px;">No phone</div>'}
        </div>
        ${b.website ? `<a class="card-website" href="${esc(b.website)}" target="_blank" rel="noopener">${esc(b.website.replace(/^https?:\/\//,''))}</a>` : ''}
        <div class="card-actions">
          ${b.phone
            ? `<a class="action-btn" href="tel:${esc(b.phone)}">📞 Call</a>`
            : `<button class="action-btn" disabled style="opacity:0.3;cursor:not-allowed;">📞 Call</button>`}
          <button class="action-btn" onclick="openDemo('${esc(b.name)}')">👁 Demo</button>
          <button class="action-btn add-btn" onclick="openModal(${allResults.indexOf(b)})">+ Add</button>
        </div>
      </div>
    `).join('');
  }

  function showEmpty(msg) {
    const el = document.getElementById('empty');
    el.classList.add('show');
    el.querySelector('div:last-child').textContent = msg;
    document.getElementById('results-info').style.display = 'none';
  }

  function openDemo(name) {
    const url = `https://demo.kronosai.co.nz/?b=${encodeURIComponent(name)}&t=${encodeURIComponent(currentIndustry)}`;
    window.open(url, '_blank');
  }

  // ── Modal ──
  let pendingIdx = null;

  function openModal(idx) {
    pendingIdx = idx;
    const b = allResults[idx];
    document.getElementById('m-name').value = b.name;
    document.getElementById('m-phone').value = b.phone || '';
    document.getElementById('m-email').value = '';

    // auto-select industry
    const ind = currentIndustry.toLowerCase();
    const sel = document.getElementById('m-industry');
    const opts = ['plumber','electrician','trades','auto','barber','cafe','salon','gym','restaurant'];
    let matched = opts.find(o => ind.includes(o)) || 'trades';
    sel.value = matched;

    // reset colour
    selectedColour = '#FF3B3B';
    document.querySelectorAll('.colour-chip').forEach(c => c.classList.remove('selected'));
    document.querySelector('.colour-chip[data-colour="#FF3B3B"]').classList.add('selected');

    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    pendingIdx = null;
  }

  function selectColour(el) {
    document.querySelectorAll('.colour-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedColour = el.dataset.colour;
  }

  function confirmAdd() {
    const name = document.getElementById('m-name').value.trim();
    const industry = document.getElementById('m-industry').value;
    const phone = document.getElementById('m-phone').value.trim();
    const email = document.getElementById('m-email').value.trim();
    const colour = selectedColour;

    if (pendingIdx !== null) {
      const b = allResults[pendingIdx];
      const row = [name, industry, phone, email, b.address, b.website || '', b.rating || '', colour].join('\t');
      navigator.clipboard.writeText(row).then(() => {
        addedCount++;
        document.getElementById('stat-added').textContent = addedCount;
        closeModal();
        showToast('Copied! Opening sheet…', '#00E07A');
        setTimeout(() => {
          window.open('https://docs.google.com/spreadsheets/d/1boKHpI08Jh7borWbhU9mv_a9y44Kh-CXTRFru5HSmHk/edit', '_blank');
        }, 300);
      }).catch(() => {
        showToast('Clipboard failed — paste manually', '#FF9500');
      });
    }
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Toast ──
  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#00E07A';
    t.style.color = color === '#FFB800' || color === '#FF9500' ? '#000' : (color === '#FF3B3B' ? '#fff' : '#000');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Escape ──
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Enter key on search inputs
  ['inp-industry','inp-location'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  });

  // Show empty on load
  document.getElementById('empty').classList.add('show');
</script>
</body>
</html>
